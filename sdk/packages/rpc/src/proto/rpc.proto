syntax = "proto3";

package cline.rpc.v1;

service ClineGateway {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
  rpc RegisterClient(RegisterClientRequest) returns (RegisterClientResponse);
  rpc EnsureSession(EnsureSessionRequest) returns (EnsureSessionResponse);
  rpc UpsertSession(UpsertSessionRequest) returns (UpsertSessionResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc UpdateSession(UpdateSessionRequest) returns (UpdateSessionResponse);
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);
  rpc EnqueueSpawnRequest(EnqueueSpawnRequestRequest) returns (EnqueueSpawnRequestResponse);
  rpc ClaimSpawnRequest(ClaimSpawnRequestRequest) returns (ClaimSpawnRequestResponse);
  rpc StartRuntimeSession(StartRuntimeSessionRequest) returns (StartRuntimeSessionResponse);
  rpc SendRuntimeSession(SendRuntimeSessionRequest) returns (SendRuntimeSessionResponse);
  rpc StopRuntimeSession(StopRuntimeSessionRequest) returns (StopRuntimeSessionResponse);
  rpc AbortRuntimeSession(AbortRuntimeSessionRequest) returns (AbortRuntimeSessionResponse);
  rpc RunProviderAction(RunProviderActionRequest) returns (RunProviderActionResponse);
  rpc RunProviderOAuthLogin(RunProviderOAuthLoginRequest) returns (RunProviderOAuthLoginResponse);
  rpc StartTask(StartTaskRequest) returns (TaskResponse);
  rpc CompleteTask(CompleteTaskRequest) returns (TaskResponse);
  rpc PublishEvent(PublishEventRequest) returns (PublishEventResponse);
  rpc StreamEvents(StreamEventsRequest) returns (stream RoutedEvent);
  rpc RequestToolApproval(RequestToolApprovalRequest) returns (RequestToolApprovalResponse);
  rpc RespondToolApproval(RespondToolApprovalRequest) returns (RespondToolApprovalResponse);
  rpc ListPendingApprovals(ListPendingApprovalsRequest) returns (ListPendingApprovalsResponse);
  rpc CreateSchedule(CreateScheduleRequest) returns (CreateScheduleResponse);
  rpc GetSchedule(GetScheduleRequest) returns (GetScheduleResponse);
  rpc ListSchedules(ListSchedulesRequest) returns (ListSchedulesResponse);
  rpc UpdateSchedule(UpdateScheduleRequest) returns (UpdateScheduleResponse);
  rpc DeleteSchedule(DeleteScheduleRequest) returns (DeleteScheduleResponse);
  rpc PauseSchedule(PauseScheduleRequest) returns (PauseScheduleResponse);
  rpc ResumeSchedule(ResumeScheduleRequest) returns (ResumeScheduleResponse);
  rpc TriggerScheduleNow(TriggerScheduleNowRequest) returns (TriggerScheduleNowResponse);
  rpc ListScheduleExecutions(ListScheduleExecutionsRequest) returns (ListScheduleExecutionsResponse);
  rpc GetScheduleStats(GetScheduleStatsRequest) returns (GetScheduleStatsResponse);
  rpc GetActiveScheduledExecutions(GetActiveScheduledExecutionsRequest) returns (GetActiveScheduledExecutionsResponse);
  rpc GetUpcomingScheduledRuns(GetUpcomingScheduledRunsRequest) returns (GetUpcomingScheduledRunsResponse);
}

message HealthRequest {}

message HealthResponse {
  string server_id = 1;
  string address = 2;
  bool running = 3;
  string started_at = 4;
}

message ShutdownRequest {}

message ShutdownResponse {
  bool accepted = 1;
}

message RegisterClientRequest {
  string client_id = 1;
  string client_type = 2;
  map<string, string> metadata = 3;
}

message RegisterClientResponse {
  string client_id = 1;
  bool registered = 2;
}

message SessionRecord {
  string session_id = 1;
  string source = 2;
  int32 pid = 3;
  string started_at = 4;
  string ended_at = 5;
  int32 exit_code = 6;
  string status = 7;
  int32 status_lock = 8;
  bool interactive = 9;
  string provider = 10;
  string model = 11;
  string cwd = 12;
  string workspace_root = 13;
  string team_name = 14;
  bool enable_tools = 15;
  bool enable_spawn = 16;
  bool enable_teams = 17;
  string parent_session_id = 18;
  string parent_agent_id = 19;
  string agent_id = 20;
  string conversation_id = 21;
  bool is_subagent = 22;
  string prompt = 23;
  string transcript_path = 24;
  string hook_path = 25;
  string messages_path = 26;
  string updated_at = 27;
  string metadata_json = 28;
}

message EnsureSessionRequest {
  string session_id = 1;
  string client_id = 2;
  string workspace_root = 3;
  string status = 4;
  string metadata_json = 5;
}

message EnsureSessionResponse {
  string session_id = 1;
  bool created = 2;
  string status = 3;
}

message UpsertSessionRequest {
  SessionRecord session = 1;
}

message UpsertSessionResponse {
  bool persisted = 1;
}

message GetSessionRequest {
  string session_id = 1;
}

message GetSessionResponse {
  SessionRecord session = 1;
}

message ListSessionsRequest {
  int32 limit = 1;
  string parent_session_id = 2;
  string status = 3;
}

message ListSessionsResponse {
  repeated SessionRecord sessions = 1;
}

message UpdateSessionRequest {
  string session_id = 1;
  string status = 2;
  string ended_at = 3;
  int32 exit_code = 4;
  bool has_exit_code = 5;
  string prompt = 6;
  bool has_prompt = 7;
  string parent_session_id = 8;
  bool has_parent_session_id = 9;
  string parent_agent_id = 10;
  bool has_parent_agent_id = 11;
  string agent_id = 12;
  bool has_agent_id = 13;
  string conversation_id = 14;
  bool has_conversation_id = 15;
  int32 expected_status_lock = 16;
  bool has_expected_status_lock = 17;
  bool set_running = 18;
  string metadata_json = 19;
  bool has_metadata_json = 20;
}

message UpdateSessionResponse {
  bool updated = 1;
  int32 status_lock = 2;
}

message DeleteSessionRequest {
  string session_id = 1;
  bool cascade = 2;
}

message DeleteSessionResponse {
  bool deleted = 1;
}

message EnqueueSpawnRequestRequest {
  string root_session_id = 1;
  string parent_agent_id = 2;
  string task = 3;
  string system_prompt = 4;
}

message EnqueueSpawnRequestResponse {
  bool enqueued = 1;
}

message SpawnQueueItem {
  int64 id = 1;
  string root_session_id = 2;
  string parent_agent_id = 3;
  string task = 4;
  string system_prompt = 5;
  string created_at = 6;
  string consumed_at = 7;
}

message ClaimSpawnRequestRequest {
  string root_session_id = 1;
  string parent_agent_id = 2;
}

message ClaimSpawnRequestResponse {
  SpawnQueueItem item = 1;
}

message StartRuntimeSessionRequest {
  string request_json = 1;
}

message StartRuntimeSessionResponse {
  string session_id = 1;
  string start_result_json = 2;
}

message SendRuntimeSessionRequest {
  string session_id = 1;
  string request_json = 2;
}

message SendRuntimeSessionResponse {
  string result_json = 1;
}

message StopRuntimeSessionRequest {
  string session_id = 1;
}

message StopRuntimeSessionResponse {
  bool applied = 1;
}

message AbortRuntimeSessionRequest {
  string session_id = 1;
}

message AbortRuntimeSessionResponse {
  bool applied = 1;
}

message RunProviderActionRequest {
  string request_json = 1;
}

message RunProviderActionResponse {
  string result_json = 1;
}

message RunProviderOAuthLoginRequest {
  string provider = 1;
}

message RunProviderOAuthLoginResponse {
  string provider = 1;
  string api_key = 2;
}

message StartTaskRequest {
  string session_id = 1;
  string task_id = 2;
  string title = 3;
  string payload_json = 4;
}

message CompleteTaskRequest {
  string session_id = 1;
  string task_id = 2;
  string status = 3;
  string result_json = 4;
}

message TaskResponse {
  string session_id = 1;
  string task_id = 2;
  string status = 3;
  bool updated = 4;
}

message PublishEventRequest {
  string event_id = 1;
  string session_id = 2;
  string task_id = 3;
  string event_type = 4;
  string payload_json = 5;
  string source_client_id = 6;
}

message PublishEventResponse {
  string event_id = 1;
  bool accepted = 2;
}

message StreamEventsRequest {
  string client_id = 1;
  repeated string session_ids = 2;
}

message RoutedEvent {
  string event_id = 1;
  string session_id = 2;
  string task_id = 3;
  string event_type = 4;
  string payload_json = 5;
  string source_client_id = 6;
  string ts = 7;
}

message RequestToolApprovalRequest {
  string approval_id = 1;
  string session_id = 2;
  string task_id = 3;
  string tool_call_id = 4;
  string tool_name = 5;
  string input_json = 6;
  string requester_client_id = 7;
  int32 timeout_ms = 8;
}

message RequestToolApprovalResponse {
  string approval_id = 1;
  bool decided = 2;
  bool approved = 3;
  string reason = 4;
}

message RespondToolApprovalRequest {
  string approval_id = 1;
  string responder_client_id = 2;
  bool approved = 3;
  string reason = 4;
}

message RespondToolApprovalResponse {
  string approval_id = 1;
  bool applied = 2;
}

message ListPendingApprovalsRequest {
  string session_id = 1;
}

message PendingApproval {
  string approval_id = 1;
  string session_id = 2;
  string task_id = 3;
  string tool_call_id = 4;
  string tool_name = 5;
  string input_json = 6;
  string requester_client_id = 7;
  string created_at = 8;
}

message ListPendingApprovalsResponse {
  repeated PendingApproval approvals = 1;
}

message Schedule {
  string schedule_id = 1;
  string name = 2;
  string cron_pattern = 3;
  string prompt = 4;
  string provider = 5;
  string model = 6;
  string mode = 7;
  string workspace_root = 8;
  string cwd = 9;
  string system_prompt = 10;
  int32 max_iterations = 11;
  bool has_max_iterations = 12;
  int32 timeout_seconds = 13;
  bool has_timeout_seconds = 14;
  int32 max_parallel = 15;
  bool enabled = 16;
  string created_at = 17;
  string updated_at = 18;
  string last_run_at = 19;
  string next_run_at = 20;
  string created_by = 21;
  string tags_json = 22;
  string metadata_json = 23;
}

message ScheduleExecution {
  string execution_id = 1;
  string schedule_id = 2;
  string session_id = 3;
  string triggered_at = 4;
  string started_at = 5;
  string ended_at = 6;
  string status = 7;
  int32 exit_code = 8;
  bool has_exit_code = 9;
  string error_message = 10;
  int32 iterations = 11;
  bool has_iterations = 12;
  int32 tokens_used = 13;
  bool has_tokens_used = 14;
  double cost_usd = 15;
  bool has_cost_usd = 16;
}

message CreateScheduleRequest {
  string name = 1;
  string cron_pattern = 2;
  string prompt = 3;
  string provider = 4;
  string model = 5;
  string mode = 6;
  string workspace_root = 7;
  string cwd = 8;
  string system_prompt = 9;
  int32 max_iterations = 10;
  bool has_max_iterations = 11;
  int32 timeout_seconds = 12;
  bool has_timeout_seconds = 13;
  int32 max_parallel = 14;
  bool enabled = 15;
  string created_by = 16;
  string tags_json = 17;
  string metadata_json = 18;
}

message CreateScheduleResponse {
  Schedule schedule = 1;
}

message GetScheduleRequest {
  string schedule_id = 1;
}

message GetScheduleResponse {
  Schedule schedule = 1;
}

message ListSchedulesRequest {
  int32 limit = 1;
  bool has_enabled = 2;
  bool enabled = 3;
  string tags_json = 4;
}

message ListSchedulesResponse {
  repeated Schedule schedules = 1;
}

message UpdateScheduleRequest {
  string schedule_id = 1;
  string name = 2;
  bool has_name = 3;
  string cron_pattern = 4;
  bool has_cron_pattern = 5;
  string prompt = 6;
  bool has_prompt = 7;
  string provider = 8;
  bool has_provider = 9;
  string model = 10;
  bool has_model = 11;
  string mode = 12;
  bool has_mode = 13;
  string workspace_root = 14;
  bool has_workspace_root = 15;
  string cwd = 16;
  bool has_cwd = 17;
  string system_prompt = 18;
  bool has_system_prompt = 19;
  int32 max_iterations = 20;
  bool has_max_iterations = 21;
  bool clear_max_iterations = 22;
  int32 timeout_seconds = 23;
  bool has_timeout_seconds = 24;
  bool clear_timeout_seconds = 25;
  int32 max_parallel = 26;
  bool has_max_parallel = 27;
  bool enabled = 28;
  bool has_enabled = 29;
  string created_by = 30;
  bool has_created_by = 31;
  bool clear_created_by = 32;
  string tags_json = 33;
  bool has_tags_json = 34;
  string metadata_json = 35;
  bool has_metadata_json = 36;
}

message UpdateScheduleResponse {
  bool updated = 1;
  Schedule schedule = 2;
}

message DeleteScheduleRequest {
  string schedule_id = 1;
}

message DeleteScheduleResponse {
  bool deleted = 1;
}

message PauseScheduleRequest {
  string schedule_id = 1;
}

message PauseScheduleResponse {
  bool updated = 1;
  Schedule schedule = 2;
}

message ResumeScheduleRequest {
  string schedule_id = 1;
}

message ResumeScheduleResponse {
  bool updated = 1;
  Schedule schedule = 2;
}

message TriggerScheduleNowRequest {
  string schedule_id = 1;
}

message TriggerScheduleNowResponse {
  ScheduleExecution execution = 1;
}

message ListScheduleExecutionsRequest {
  string schedule_id = 1;
  string status = 2;
  int32 limit = 3;
}

message ListScheduleExecutionsResponse {
  repeated ScheduleExecution executions = 1;
}

message GetScheduleStatsRequest {
  string schedule_id = 1;
}

message GetScheduleStatsResponse {
  int32 total_runs = 1;
  double success_rate = 2;
  double avg_duration_seconds = 3;
  ScheduleExecution last_failure = 4;
}

message ActiveScheduledExecution {
  string execution_id = 1;
  string schedule_id = 2;
  string session_id = 3;
  string started_at = 4;
  string timeout_at = 5;
}

message GetActiveScheduledExecutionsRequest {}

message GetActiveScheduledExecutionsResponse {
  repeated ActiveScheduledExecution executions = 1;
}

message GetUpcomingScheduledRunsRequest {
  int32 limit = 1;
}

message UpcomingScheduledRun {
  string schedule_id = 1;
  string name = 2;
  string next_run_at = 3;
}

message GetUpcomingScheduledRunsResponse {
  repeated UpcomingScheduledRun runs = 1;
}
